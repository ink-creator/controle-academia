<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
        Controle Academia
        {% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>
<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}

            {% for categoria, mensagem in messages %}

                <div class="alert {{ categoria }}">
                    {{ mensagem }}
                </div>

            {% endfor %}

        {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}

</body>
