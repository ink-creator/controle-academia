{% extends 'base.html' %}

{% block content %}

<section class="auth-container">

    <div class="auth-box">

        <div class="auth-header">

            <h1>Criar Conta</h1>

            <p>
                Cadastre-se para começar
                seus treinos.
            </p>

        </div>

        <form
            method="POST"
            class="auth-form"
        >

            <div class="input-group">

                <label>Nome</label>

                <input
                    type="text"
                    name="nome"
                    placeholder="Digite seu nome"
                    required
                >

            </div>

            <div class="input-group">

                <label>E-mail</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Digite seu e-mail"
                    required
                >

            </div>

            <div class="input-group">

                <label>Senha</label>

                <input
                    type="password"
                    name="senha"
                    placeholder="Crie uma senha"
                    required
                >

            </div>

            <button
                type="submit"
                class="auth-btn"
            >
                Criar conta
            </button>

        </form>

        <div class="auth-footer">

            <p>
                Já possui conta?
                <a href="{{ url_for('auth.login') }}">
                    Entrar
                </a>
            </p>

        </div>

    </div>

</section>

{% endblock %}
