{% extends 'components/dashboard_layout.html' %}

{% block title %}Criar Treino{% endblock %}

{% block dashboard_content %}

<div class="dashboard-header">
    <div>
        <h1>Novo Treino</h1>
        <p>Adicione um novo treino à sua lista.</p>
    </div>
    <a href="{{ url_for('treinos.lista') }}" class="auth-btn" style="background:transparent;border:1px solid var(--border);color:var(--text-soft);">
        ← Voltar
    </a>
</div>

<div class="perfil-container">
    <form method="POST" class="perfil-form">

        <div class="input-group">
            <label>Nome do Treino</label>
            <input type="text" name="nome" placeholder="Ex: Treino A — Peito e Tríceps" required>
        </div>

        <div class="input-group">
            <label>Descrição</label>
            <input type="text" name="descricao" placeholder="Breve descrição (opcional)">
        </div>

        <div class="input-group">
            <label>Categoria</label>
            <input type="text" name="categoria" placeholder="Ex: Peito, Costas, Pernas...">
        </div>

        <div style="margin-top:8px;">
            <button type="submit" class="auth-btn">Criar Treino</button>
        </div>

    </form>
</div>

{% endblock %}
