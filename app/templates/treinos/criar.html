{% extends 'base.html' %}

{% block title %}
Criar Treino
{% endblock %}

{% block content %}

<section class="auth-container">

    <div class="auth-box">

        <div class="auth-header">

            <h1>Novo Treino</h1>

            <p>
                Cadastre um treino.
            </p>

        </div>

        <form method="POST" class="auth-form">

            <div class="input-group">

                <label>Nome</label>

                <input
                    type="text"
                    name="nome"
                    required
                >

            </div>

            <div class="input-group">

                <label>Descrição</label>

                <input
                    type="text"
                    name="descricao"
                >

            </div>

            <div class="input-group">

                <label>Categoria</label>

                <input
                    type="text"
                    name="categoria"
                    placeholder="Ex: Peito, Costas..."
                >

            </div>

            <button
                type="submit"
                class="auth-btn"
            >
                Criar Treino
            </button>

        </form>

    </div>

</section>

{% endblock %}
