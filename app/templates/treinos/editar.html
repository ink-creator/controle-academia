{% extends 'base.html' %}

{% block title %}
Editar Treino
{% endblock %}

{% block content %}

<section class="auth-container">

    <div class="auth-box">

        <div class="auth-header">

            <h1>Editar Treino</h1>

        </div>

        <form method="POST" class="auth-form">

            <div class="input-group">

                <label>Nome</label>

                <input
                    type="text"
                    name="nome"
                    value="{{ treino.nome }}"
                    required
                >

            </div>

            <div class="input-group">

                <label>Descrição</label>

                <input
                    type="text"
                    name="descricao"
                    value="{{ treino.descricao }}"
                >

            </div>

            <div class="input-group">

                <label>Categoria</label>

                <input
                    type="text"
                    name="categoria"
                    value="{{ treino.categoria }}"
                >

            </div>

            <button
                type="submit"
                class="auth-btn"
            >
                Salvar Alterações
            </button>

        </form>

    </div>

</section>

{% endblock %}
